<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片加载测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
        }
        #test-image {
            max-width: 300px;
            height: 400px;
            border: 2px solid #ccc;
            margin: 20px auto;
            object-fit: cover;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        #status {
            margin: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>waifu.pics API 测试</h1>
    <button onclick="loadImage()">加载动漫图片</button>
    <div id="status"></div>
    <img id="test-image" src="" alt="测试图片" />
    
    <script>
        async function loadImage() {
            const img = document.getElementById('test-image');
            const status = document.getElementById('status');
            
            status.textContent = '正在请求 API...';
            img.style.display = 'none';
            
            try {
                const response = await fetch('https://api.waifu.pics/sfw/waifu');
                const data = await response.json();
                
                console.log('API 响应:', data);
                
                img.onload = () => {
                    status.textContent = '加载成功！';
                    img.style.display = 'block';
                };
                
                img.onerror = () => {
                    status.textContent = '图片加载失败';
                };
                
                img.src = data.url;
            } catch (error) {
                status.textContent = 'API 请求失败：' + error.message;
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
